# Example: minimal PR workflow for a site consuming perf-config.
# Drop this at .github/workflows/perf.yml in your site repo, edit the
# `with:` block, and replace HerrEmil with the real GitHub owner.
name: perf

on:
  pull_request:
    # Skip docs-only PRs to keep the gate cheap (~3 min full job).
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"

jobs:
  perf:
    # Pin to the v1 tag so patch updates flow in automatically.
    # Bump to a specific tag (e.g. @v1.0.0) if you want immutability.
    uses: HerrEmil/perf-config/.github/workflows/perf.yml@v1
    with:
      site_dir: dist             # built output, relative to this repo's root
      build_cmd: yarn build      # or "npm run build" / "pnpm build" / "echo no build"
      tier: spa                  # static | spa | game — picks the budget profile
      package_manager: yarn      # yarn | npm | pnpm | none (none = no package.json)
      node_version: "20"
      # perf_config_ref: v1      # optional; defaults to v1
