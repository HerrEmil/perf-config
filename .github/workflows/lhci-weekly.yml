# Weekly LHCI cron — runs each site's own Lighthouse assertions against its
# live prod URL and opens a regression issue when the same site fails two
# weeks in a row.
#
# Manual run: `gh workflow run lhci-weekly.yml -R HerrEmil/perf-config`
#
# Cross-repo issue creation requires a PAT with `repo` scope stored in the
# `HERREMIL_ISSUE_TOKEN` secret. Without it the workflow falls back to opening
# the issue in `HerrEmil/perf-config` itself (using the default GITHUB_TOKEN)
# and tags the affected site in the title.
#
# Streak state (consecutive failures per site) is persisted on a dedicated
# orphan branch `lhci-state`. One JSON file per site under `sites/<key>.json`.
#
# Threshold model: per-site. Each site's `lighthouserc.json` (the same file
# the on-PR perf gate uses) is the bar. The cron rewrites `collect` to point
# at the live URL but keeps `assert` intact — so a weekly failure means
# "site is below its own threshold", i.e. a regression against the bar that
# site agreed to maintain. No universal aspirational bar: see redesign notes
# in commit history (replaces strict perf>=0.98 / LCP<=1500ms desktop).
name: lhci-weekly

on:
  schedule:
    # Mondays 06:00 UTC. GitHub may delay scheduled runs under load.
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      reset_state:
        description: "Reset 2-fail streak state for all sites."
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  issues: write

jobs:
  lhci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1   # serialize to avoid lhci-state branch push contention
      matrix:
        site:
          - { key: cv,                url: "https://cv.herremil.com",                repo: "HerrEmil/cv" }
          - { key: herremil-com,      url: "https://herremil.com",                   repo: "HerrEmil/HerrEmil.com" }
          - { key: gameland,          url: "https://gameland.herremil.com",          repo: "HerrEmil/GameLand" }
          - { key: legendaryjourney,  url: "https://legendaryjourney.herremil.com",  repo: "HerrEmil/LegendaryJourney" }
          - { key: sandpiper,         url: "https://sandpiper.herremil.com",         repo: "HerrEmil/Sandpiper" }
          - { key: chess,             url: "https://chess.herremil.com",             repo: "HerrEmil/Chess" }
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Pull the site's own lighthouserc.json. This is the file its on-PR perf
      # gate uses, so the weekly cron measures against the same bar — making
      # the cron a true regression detector.
      - name: Fetch site lighthouserc.json
        id: fetch_rc
        env:
          SITE_REPO: ${{ matrix.site.repo }}
          # GITHUB_TOKEN is scoped to perf-config and cannot read other repos
          # (raw.githubusercontent.com returns 404 for private siblings even
          # with the bearer header). HERREMIL_ISSUE_TOKEN is a cross-repo PAT
          # with `repo` scope, so use it first when available; fall back to
          # unauth raw.gh fetch for public sites if the PAT isn't set.
          ISSUE_TOKEN: ${{ secrets.HERREMIL_ISSUE_TOKEN }}
        run: |
          set -euo pipefail
          rm -f /tmp/site-lhrc.json
          for branch in main master; do
            if [ -n "${ISSUE_TOKEN:-}" ]; then
              # Use the Contents API — works for both public and private repos
              # with the PAT. `-f` makes curl exit non-zero on 404.
              api="https://api.github.com/repos/${SITE_REPO}/contents/lighthouserc.json?ref=${branch}"
              if curl -fsSL \
                   -H "Authorization: Bearer ${ISSUE_TOKEN}" \
                   -H "Accept: application/vnd.github.v3.raw" \
                   "$api" -o /tmp/site-lhrc.json; then
                echo "fetched lighthouserc.json from ${SITE_REPO}@${branch} via Contents API"
                cat /tmp/site-lhrc.json
                echo "found=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            else
              url="https://raw.githubusercontent.com/${SITE_REPO}/${branch}/lighthouserc.json"
              if curl -fsSL "$url" -o /tmp/site-lhrc.json; then
                echo "fetched lighthouserc.json from ${SITE_REPO}@${branch} (unauth raw.gh)"
                cat /tmp/site-lhrc.json
                echo "found=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            fi
          done
          echo "no lighthouserc.json in ${SITE_REPO} (main/master) — will use inline shared fallback in next step"
          rm -f /tmp/site-lhrc.json
          echo "found=false" >> "$GITHUB_OUTPUT"

      # Rewrite the site's lighthouserc.json so it audits the live URL instead
      # of a local staticDistDir. Assertions are preserved verbatim — that's
      # the per-site regression bar.
      - name: Build LHCI config for live URL
        env:
          SITE_URL: ${{ matrix.site.url }}
        run: |
          set -euo pipefail
          # If the site's rc didn't exist, fall back to a sane shared default.
          if [ ! -s /tmp/site-lhrc.json ]; then
            cat > /tmp/site-lhrc.json <<'JSON'
          {
            "ci": {
              "collect": { "numberOfRuns": 3 },
              "assert": {
                "preset": "lighthouse:no-pwa",
                "assertions": {
                  "categories:performance": ["error", { "minScore": 0.92 }],
                  "largest-contentful-paint": ["error", { "maxNumericValue": 1800 }]
                }
              }
            }
          }
          JSON
          fi
          # Strip staticDistDir, force url to the live URL, keep numberOfRuns
          # (default to 3 if the site didn't set it), keep assert as-is, force
          # upload target to temporary-public-storage so reports are linkable.
          jq --arg url "$SITE_URL" '
            .ci.collect = (
              (.ci.collect // {})
              | del(.staticDistDir)
              | .url = [$url]
              | .numberOfRuns = (.numberOfRuns // 3)
            )
            | .ci.upload = { "target": "temporary-public-storage" }
          ' /tmp/site-lhrc.json > /tmp/lhci-weekly.json
          echo "--- effective LHCI config ---"
          cat /tmp/lhci-weekly.json

      - name: Run LHCI (per-site thresholds, live URL)
        id: lhci
        continue-on-error: true
        run: npx --yes @lhci/cli@latest autorun --config=/tmp/lhci-weekly.json

      - name: Checkout state branch
        uses: actions/checkout@v4
        with:
          ref: lhci-state
          path: state
          fetch-depth: 1
        continue-on-error: true   # branch may not exist yet on first run

      - name: Update streak state
        id: streak
        env:
          SITE_KEY: ${{ matrix.site.key }}
          STATUS: ${{ steps.lhci.outcome == 'success' && 'pass' || 'fail' }}
          RESET: ${{ inputs.reset_state }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ ! -d state/.git ]; then
            mkdir -p state
            cd state
            git init -q -b lhci-state
            git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            cd ..
          fi
          cd state
          git config user.name  "lhci-cron[bot]"
          git config user.email "lhci-cron@users.noreply.github.com"

          mkdir -p sites
          state_file="sites/${SITE_KEY}.json"

          if [ "$RESET" = "true" ]; then
            rm -f "$state_file"
          fi

          prev_streak=0
          if [ -f "$state_file" ]; then
            prev_streak=$(jq -r '.fail_streak // 0' "$state_file")
          fi

          if [ "$STATUS" = "fail" ]; then
            new_streak=$((prev_streak + 1))
          else
            new_streak=0
          fi

          jq -n --arg status "$STATUS" \
                --argjson streak "$new_streak" \
                --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                --arg run "$RUN_ID" \
                '{last_status: $status, fail_streak: $streak, last_run_at: $ts, last_run_id: $run}' \
                > "$state_file"

          echo "fail_streak=$new_streak" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" = "fail" ] && [ "$new_streak" -ge 2 ]; then
            echo "flag=true" >> "$GITHUB_OUTPUT"
          else
            echo "flag=false" >> "$GITHUB_OUTPUT"
          fi

          git add -A
          if git diff --cached --quiet; then
            echo "no state change"
          else
            git commit -m "lhci-state: ${SITE_KEY} ${STATUS} streak=${new_streak}"
            # Push; if branch is brand-new, push -u; if exists, normal push.
            git push origin lhci-state || git push -u origin HEAD:lhci-state
          fi

      - name: Open regression issue
        if: steps.streak.outputs.flag == 'true'
        env:
          ISSUE_TOKEN: ${{ secrets.HERREMIL_ISSUE_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE_KEY: ${{ matrix.site.key }}
          SITE_URL: ${{ matrix.site.url }}
          SITE_REPO: ${{ matrix.site.repo }}
          STREAK: ${{ steps.streak.outputs.fail_streak }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          title="[perf-regression] ${SITE_KEY} (${SITE_URL}) — ${STREAK} consecutive LHCI failures"
          body=$(cat <<MD
          Weekly LHCI run failed for **${SITE_URL}** for the **${STREAK}th** consecutive week.

          - Thresholds: site's own \`lighthouserc.json\` (same bar as the on-PR perf gate), evaluated against the live URL with 3-run median.
          - Run: ${RUN_URL}
          - Source: \`HerrEmil/perf-config/.github/workflows/lhci-weekly.yml\`

          To clear: investigate the live-URL regression vs the site's own bar, ship a fix, and the next green weekly run resets the streak. To suppress for a single week, run \`gh workflow run lhci-weekly.yml -R HerrEmil/perf-config -f reset_state=true\` after triaging.
          MD
          )

          if [ -n "${ISSUE_TOKEN:-}" ]; then
            echo "Creating issue in $SITE_REPO via PAT"
            GH_TOKEN="$ISSUE_TOKEN" gh issue create \
              --repo "$SITE_REPO" \
              --title "$title" \
              --body  "$body"
          else
            echo "HERREMIL_ISSUE_TOKEN not set — falling back to in-repo issue on perf-config"
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "$title" \
              --body  "$body (target repo: \`$SITE_REPO\`)"
          fi
