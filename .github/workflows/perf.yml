# Reusable performance workflow for the perf-config shared pipeline.
#
# Cross-repo invocation (each consuming site is its own GitHub repo):
#   uses: HerrEmil/perf-config/.github/workflows/perf.yml@v1
#   with:
#     site_dir: dist
#     tier: spa
#
# The calling repo's checkout is the workspace root. perf-config's tools
# and configs are pulled in via a second checkout into ./.perf-config/.
name: perf

on:
  workflow_call:
    inputs:
      site_dir:
        description: "Path to the built/dist directory to audit (e.g. dist)."
        type: string
        required: true
      build_cmd:
        description: "Command used to build the site. Default: yarn build."
        type: string
        required: false
        default: "yarn build"
      prod_url:
        description: "Production URL (only used by the weekly cron variant)."
        type: string
        required: false
        default: ""
      node_version:
        description: "Node.js version to use."
        type: string
        required: false
        default: "20"
      package_manager:
        description: "Package manager: yarn | npm | pnpm."
        type: string
        required: false
        default: "yarn"
      tier:
        description: "Budget tier: static | spa | game. Selects perf-budgets profile."
        type: string
        required: false
        default: "spa"
      perf_config_ref:
        description: "Git ref of perf-config to use (tag, branch, or sha). Default: v1."
        type: string
        required: false
        default: "v1"

jobs:
  perf:
    runs-on: ubuntu-latest
    steps:
      # 1. Calling repo (the site being audited) — default workspace.
      - name: Checkout site
        uses: actions/checkout@v4

      # 2. perf-config — pulled into ./.perf-config/ at the pinned ref.
      # NOTE: HerrEmil must be replaced with the real GitHub owner/org
      # before this workflow can run. Left explicit so misconfiguration fails
      # loudly rather than silently checking out the wrong repo.
      - name: Checkout perf-config
        uses: actions/checkout@v4
        with:
          repository: HerrEmil/perf-config
          path: .perf-config
          ref: ${{ inputs.perf_config_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: ${{ inputs.package_manager }}

      # Install dependencies using the site's chosen package manager.
      - name: Install (yarn)
        if: inputs.package_manager == 'yarn'
        run: yarn install --frozen-lockfile

      - name: Install (npm)
        if: inputs.package_manager == 'npm'
        run: npm ci

      - name: Install (pnpm)
        if: inputs.package_manager == 'pnpm'
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      # Build step is skipped for the static tier (pre-built sites).
      - name: Build
        if: inputs.tier != 'static'
        run: ${{ inputs.build_cmd }}

      # Asset guard: enforces filename hashing, gzip presence, no source maps in prod, etc.
      - name: Asset guard
        run: bash .perf-config/tools/asset-guard.sh ${{ inputs.site_dir }}

      # size-limit tracks JS/CSS bundle size against per-site .size-limit.json.
      # Run directly via the chosen package manager so locally-installed presets
      # (e.g. @size-limit/preset-app) are picked up; andresz1/size-limit-action
      # forces npm, which silently drops yarn-only deps.
      - name: size-limit
        if: inputs.tier != 'static'
        run: |
          case "${{ inputs.package_manager }}" in
            yarn) yarn size-limit ;;
            npm)  npm exec -- size-limit ;;
            pnpm) pnpm exec size-limit ;;
            *)    echo "Unknown package_manager: ${{ inputs.package_manager }}" >&2; exit 1 ;;
          esac

      # Per-site Lighthouse override lives at ./lighthouserc.json (repo root) if
      # present; otherwise fall back to the shared .perf-config/lighthouserc.json.
      # The per-site config is responsible for setting `staticDistDir` to the
      # right relative path.
      - name: Lighthouse CI
        run: |
          if [ -f "lighthouserc.json" ]; then
            npx --yes @lhci/cli@latest autorun --config=lighthouserc.json
          else
            npx --yes @lhci/cli@latest autorun --config=.perf-config/lighthouserc.json
          fi

      # HTML lint. Per-site config wins (`.htmlvalidate.json` / `html-validate.config.*`
      # at repo root); otherwise the shared `.perf-config/html-validate.config.json` is used.
      # Errors fail the build — sites can extend the shared config to soften specific rules.
      - name: HTML perf-lint
        run: |
          if ls .htmlvalidate.json html-validate.config.json html-validate.config.js html-validate.config.cjs html-validate.config.mjs 2>/dev/null | grep -q .; then
            npx --yes html-validate "${{ inputs.site_dir }}/**/*.html"
          else
            npx --yes html-validate --config=.perf-config/html-validate.config.json "${{ inputs.site_dir }}/**/*.html"
          fi

      # CSS lint. Per-site config wins (`.stylelintrc*` / `stylelint.config.*`);
      # otherwise the shared `.perf-config/.stylelintrc.json` is used. Sites that need
      # plugins beyond `stylelint-config-standard` should add a local config and
      # install plugins as devDependencies.
      - name: CSS perf-lint
        run: |
          if ls .stylelintrc .stylelintrc.json .stylelintrc.js .stylelintrc.cjs .stylelintrc.mjs .stylelintrc.yaml .stylelintrc.yml stylelint.config.js stylelint.config.cjs stylelint.config.mjs 2>/dev/null | grep -q .; then
            npx --yes stylelint "${{ inputs.site_dir }}/**/*.css"
          else
            npx --yes -p stylelint -p stylelint-config-standard -- stylelint --config=.perf-config/.stylelintrc.json "${{ inputs.site_dir }}/**/*.css"
          fi
