# Reusable performance workflow for the perf-config shared pipeline.
#
# Cross-repo invocation (each consuming site is its own GitHub repo):
#   uses: HerrEmil/perf-config/.github/workflows/perf.yml@v1
#   with:
#     site_dir: dist
#     tier: spa
#
# The calling repo's checkout is the workspace root. perf-config's tools
# and configs are pulled in via a second checkout into ./.perf-config/.
name: perf

on:
  workflow_call:
    inputs:
      site_dir:
        description: "Path to the built/dist directory to audit (e.g. dist)."
        type: string
        required: true
      build_cmd:
        description: "Command used to build the site. Default: yarn build."
        type: string
        required: false
        default: "yarn build"
      prod_url:
        description: "Production URL (only used by the weekly cron variant)."
        type: string
        required: false
        default: ""
      node_version:
        description: "Node.js version to use."
        type: string
        required: false
        default: "20"
      package_manager:
        description: "Package manager: yarn | npm | pnpm | none. `none` skips Node setup, install, build, and size-limit (use for static sites with no package.json)."
        type: string
        required: false
        default: "yarn"
      tier:
        description: "Budget tier: static | spa | game. Selects perf-budgets profile."
        type: string
        required: false
        default: "spa"
      perf_config_ref:
        description: "Git ref of perf-config to use (tag, branch, or sha). Default: v1."
        type: string
        required: false
        default: "v1"

jobs:
  perf:
    runs-on: ubuntu-latest
    steps:
      # 1. Calling repo (the site being audited) — default workspace.
      - name: Checkout site
        uses: actions/checkout@v4

      # 2. perf-config — pulled into ./.perf-config/ at the pinned ref.
      # NOTE: HerrEmil must be replaced with the real GitHub owner/org
      # before this workflow can run. Left explicit so misconfiguration fails
      # loudly rather than silently checking out the wrong repo.
      - name: Checkout perf-config
        uses: actions/checkout@v4
        with:
          repository: HerrEmil/perf-config
          path: .perf-config
          ref: ${{ inputs.perf_config_ref }}

      # Node is required by LHCI and the lint steps even when the site itself
      # has no package.json — we still install via npx in those steps. Cache is
      # only enabled when there's a package manager to cache for.
      - name: Setup Node.js (cached)
        if: inputs.package_manager != 'none'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: ${{ inputs.package_manager }}

      - name: Setup Node.js (no cache)
        if: inputs.package_manager == 'none'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      # Install dependencies using the site's chosen package manager.
      - name: Install (yarn)
        if: inputs.package_manager == 'yarn'
        run: yarn install --frozen-lockfile

      - name: Install (npm)
        if: inputs.package_manager == 'npm'
        run: npm ci

      - name: Install (pnpm)
        if: inputs.package_manager == 'pnpm'
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      # Build step is skipped for static tier (pre-built sites) and for
      # `package_manager: none` (no toolchain to run a build with).
      - name: Build
        if: inputs.tier != 'static' && inputs.package_manager != 'none'
        run: ${{ inputs.build_cmd }}

      # Asset guard: enforces filename hashing, gzip presence, no source maps in prod, etc.
      # Optional `.asset-guard-override.json` at the site repo root exempts listed
      # files from failing until their sunset date.
      - name: Asset guard
        run: |
          if [ -f .asset-guard-override.json ]; then
            bash .perf-config/tools/asset-guard.sh "${{ inputs.site_dir }}" .asset-guard-override.json
          else
            bash .perf-config/tools/asset-guard.sh "${{ inputs.site_dir }}"
          fi

      # size-limit tracks JS/CSS bundle size against per-site .size-limit.json.
      # Run directly via the chosen package manager so locally-installed presets
      # (e.g. @size-limit/preset-app) are picked up; andresz1/size-limit-action
      # forces npm, which silently drops yarn-only deps. Skipped for `none`
      # (no package.json → no .size-limit.json).
      - name: size-limit
        if: inputs.tier != 'static' && inputs.package_manager != 'none'
        run: |
          case "${{ inputs.package_manager }}" in
            yarn) yarn size-limit ;;
            npm)  npm exec -- size-limit ;;
            pnpm) pnpm exec size-limit ;;
            *)    echo "Unknown package_manager: ${{ inputs.package_manager }}" >&2; exit 1 ;;
          esac

      # Per-site Lighthouse override lives at ./lighthouserc.json (repo root) if
      # present; otherwise fall back to the shared .perf-config/lighthouserc.json.
      # The per-site config is responsible for setting `staticDistDir` to the
      # right relative path.
      - name: Lighthouse CI
        run: |
          if [ -f "lighthouserc.json" ]; then
            npx --yes @lhci/cli@latest autorun --config=lighthouserc.json
          else
            npx --yes @lhci/cli@latest autorun --config=.perf-config/lighthouserc.json
          fi

      # HTML lint. Per-site config wins (`.htmlvalidate.json` / `html-validate.config.*`
      # at repo root); otherwise the shared `.perf-config/html-validate.config.json` is used.
      # Errors fail the build — sites can extend the shared config to soften specific rules.
      - name: HTML perf-lint
        run: |
          if ls .htmlvalidate.json html-validate.config.json html-validate.config.js html-validate.config.cjs html-validate.config.mjs 2>/dev/null | grep -q .; then
            npx --yes html-validate "${{ inputs.site_dir }}/**/*.html"
          else
            npx --yes html-validate --config=.perf-config/html-validate.config.json "${{ inputs.site_dir }}/**/*.html"
          fi

      # CSS lint. Per-site config wins (`.stylelintrc*` / `stylelint.config.*`);
      # otherwise the shared `.perf-config/.stylelintrc.json` is used. The shared
      # config `extends` `stylelint-config-standard`, which only resolves when
      # both packages live in the same node_modules tree. `npx -p A -p B` uses
      # separate npx caches and breaks that resolution, so we install both into
      # a tmp dir and invoke the binary directly.
      # `--allow-empty-input` prevents stylelint's NoFilesFoundError on sites
      # that have no CSS files (e.g. all CSS inlined). Real lint errors still fail.
      - name: CSS perf-lint
        run: |
          if ls .stylelintrc .stylelintrc.json .stylelintrc.js .stylelintrc.cjs .stylelintrc.mjs .stylelintrc.yaml .stylelintrc.yml stylelint.config.js stylelint.config.cjs stylelint.config.mjs 2>/dev/null | grep -q .; then
            npx --yes stylelint --allow-empty-input "${{ inputs.site_dir }}/**/*.css"
          else
            # `--config-basedir` tells stylelint where to resolve `extends`
            # from — must point at the tree where stylelint-config-standard is
            # installed (otherwise it looks next to the config file in
            # .perf-config/, where the package isn't installed).
            mkdir -p /tmp/stylelint-runner
            (cd /tmp/stylelint-runner && npm init -y >/dev/null 2>&1 && npm install --no-save --no-audit --no-fund stylelint stylelint-config-standard)
            /tmp/stylelint-runner/node_modules/.bin/stylelint \
              --config="$(pwd)/.perf-config/.stylelintrc.json" \
              --config-basedir=/tmp/stylelint-runner \
              --allow-empty-input \
              "${{ inputs.site_dir }}/**/*.css"
          fi
